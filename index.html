<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Endereço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Consultar CEP</h2>
        <div class="search-box">
            <input type="text" id="cepInput" placeholder="Digite o CEP" maxlength="8">
            <button onclick="buscarDados()">Buscar</button>
        </div>

        <div id="resultado" class="hidden">
            <p><strong>Logradouro:</strong> <span id="rua"></span></p>
            <p><strong>Bairro:</strong> <span id="bairro"></span></p>
            <p><strong>Cidade:</strong> <span id="cidade"></span></p>
            <p><strong>Estado:</strong> <span id="estado"></span></p>
            <p><strong>CEP:</strong> <span id="cepFinal"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
